<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>表单</title>
</head>
<body>
<!--method标签:提交方式
get:默认,会把输入的值拼接在url后面,有大小限制
post:不会把输入的值拼接在url后面,没有大小限制-->
<form action="#" method="get">
    <input type="text" name="username">
    <input type="submit">
</form>
</body>
</html>
