<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>列表</title>
</head>
<body>
<!--ordered list:有序列表-->
<ol type="A">
    <li>咖啡</li>
    <li>茶</li>
    <li>牛奶</li>
    <li>可乐</li>
</ol>

<!--unordered list:无序列表-->
<ul type="point">
    <li>咖啡</li>
    <li>茶</li>
    <li>牛奶</li>
    <li>可乐</li>
</ul>
</body>
</html>
