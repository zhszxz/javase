<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div id="app">
    <div v-if="count==3">div1</div>
    <br>
    <div v-else-if="count==2">div2</div>
    <br>
    <div v-else>div3</div>
    <br>
    <input v-model="count">
    <hr>
    <div v-show="count==3">v-show</div>

</div>

<script src="js/vue.js"></script>
<script>
    new Vue({
        el: "#app",
        data: function () {
            return {
                count: 3
            }
        }
    });
</script>
</body>
</html>
